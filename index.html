<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Cards</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="table">
        
        <div class="card card-red">
            <div class="card-face">
                <div class="value-top">A</div>
                <div class="diamond"></div>
                <div class="value-bottom">A</div>
            </div>
        </div>
        
        <div class="card card-red">
            <div class="card-face">
                <div class="value-top">A</div>
                <div class="heart"></div>
                <div class="value-bottom">A</div>
            </div>
        </div>
        
        <div class="card card-black">
            <div class="card-face">
                <div class="value-top">A</div>
                <div class="club">
                    <span class="stem"></span>
                </div>
                <div class="value-bottom">A</div>
            </div>
        </div>
        
        <div class="card card-black">
            <div class="card-face">
                <div class="value-top">A</div>
                <div class="spade">
                    <span class="stem"></span>
                </div>
                <div class="value-bottom">A</div>
            </div>
        </div>
        
    </div>
     
</body>
</html>
